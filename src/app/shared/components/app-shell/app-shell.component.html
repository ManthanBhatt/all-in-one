<ion-split-pane contentId="main-content" when="lg">
  <ion-menu contentId="main-content" type="overlay">
    <ion-header class="ion-no-border">
      <ion-toolbar class="ion-no-border">
        <ion-title>Essentials</ion-title>

        <div class="shell-sync-status" [class.shell-sync-status--syncing]="indicatorState() === 'syncing'"
          [class.shell-sync-status--synced]="indicatorState() === 'synced'"
          [class.shell-sync-status--offline]="indicatorState() === 'offline'"
          [class.shell-sync-status--error]="indicatorState() === 'error'" slot="end">
          <ion-icon [icon]="syncIcons[indicatorState()]" [class.spin]="indicatorState() === 'syncing'" slot="icon-only"></ion-icon>
        </div>
      </ion-toolbar>
    </ion-header>
    <ion-content>
      <div class="shell-panel">
        <div class="shell-brand">
          <div class="shell-brand__top">
            <div class="shell-wordmark">
              <span class="shell-wordmark__dot"></span>
              <div>
                <strong>Essentials</strong>
                <small>Personal operating system</small>
              </div>
            </div>
            <div class="shell-status-wrap">
              <app-offline-banner></app-offline-banner>
            </div>
          </div>
        </div>

        <div class="shell-search">
          <ion-searchbar
            [value]="searchService.query()"
            (ionInput)="searchService.query.set($any($event).target.value ?? '')"
            placeholder="Search everything"
            class="global-searchbar"
          ></ion-searchbar>
          <div class="global-results" *ngIf="searchService.results().length > 0">
            <ion-list lines="none">
              <ion-item button *ngFor="let res of searchService.results()" (click)="searchService.navigateTo(res)">
                <ion-label>
                  <h3>{{ res.title }}</h3>
                  <p>{{ res.subtitle }}</p>
                </ion-label>
              </ion-item>
            </ion-list>
          </div>
        </div>

        <div class="shell-nav">
          <a class="shell-link" *ngFor="let item of navigation()" [routerLink]="item.path"
            routerLinkActive="shell-link--active" (click)="closeMenu()">
            <span class="shell-link__tag">
              <ion-icon [icon]="item.icon"></ion-icon>
            </span>
            <span class="shell-link__copy">
              <strong>{{ item.title }}</strong>
              <small>{{ item.subtitle }}</small>
            </span>
          </a>
        </div>
      </div>
    </ion-content>
  </ion-menu>


  <ion-router-outlet id="main-content"></ion-router-outlet>
</ion-split-pane>
